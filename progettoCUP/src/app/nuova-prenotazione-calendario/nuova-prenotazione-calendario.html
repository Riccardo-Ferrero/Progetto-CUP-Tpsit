<div class="nuova-prenotazione-calendario-page py-3 py-lg-4">
	<div class="container-fluid">
		<header class="dashboard-header mb-3">
			<div
				class="d-flex flex-column flex-lg-row justify-content-between align-items-start align-items-lg-center gap-3">
				<div>
					<p class="intestazione mb-1">Nuova prenotazione</p>
					<h1 class="h3 mb-1">Seleziona giorno e orario</h1>
					<p class="text-muted mb-0">Calendario: lun-ven · 08:00-17:00</p>
				</div>
				<div class="step-badge">Step 2 di 2</div>
			</div>
		</header>

		<calendario-prenotazioni [idDottore]="idDottoreSelezionato" (slotSelezionato)="onSlotSelezionato($event)"></calendario-prenotazioni>
		<div class="d-flex justify-content-end mt-3">
			<button type="button" class="btn btn-primary btn-sm px-4" [disabled]="!haSlotSelezionato()" (click)="onContinua()">Conferma</button>
		</div>
	</div>
</div>
